name: Reusable Backend CI

# Shared backend CI for twocentssoftware .NET services. Callers pin to a tag (for example @v1)
# and override only the few inputs that vary. Tests differ per repo and live in each repo; this
# workflow just runs the generic restore/build/test around them. Test dependencies (Postgres,
# Redis, Azurite, etc.) are spun up by Testcontainers inside the test process, so no runner-level
# service containers are needed: ubuntu-latest already has Docker.
#
# Tiered tests (compute policy):
#   - UNIT tests run on every backend change (every PR push) and are the merge gate.
#   - INTEGRATION tests (the heavy Testcontainers suite) run only on pushes to main (staging
#     deploy), on tags (production), or on a PR explicitly labelled `run-integration`. They are
#     DETECTION, not prevention, on main: required status checks gate PRs (where the job is
#     unit-only), not pushes, so a failed main integration run does not auto-block -- the red-main
#     operating rule (revert/fix immediately) applies. See knowledge/shared-backend-ci.md.
#   - The single job `[BACKEND] Build and Test` is therefore one required status check whose SCOPE
#     is event-dependent: unit-only on a PR, unit+integration on main and tags. Do not read the
#     green badge on a PR as "integration passed".
#   - Tier split is by the `.Integration.` namespace filter (interim contract; opt-in by repo
#     shape). A repo whose tests do not follow that convention runs its whole suite in the unit
#     step every time -- no regression, but no savings until it adopts the convention (or the
#     planned [Trait("Category","Integration")] migration). Tiering is NOT universally guaranteed.
#
# Compute optimizations:
#   - NuGet packages are cached per repo (the cache key hashes that repo's own .csproj files).
#   - The expensive steps (restore, build, test) run only when backend-relevant files changed.
#     The job ALWAYS runs so the required status check always reports (a skipped required check
#     deadlocks the PR), but when nothing under `backend-paths` changed it finishes in seconds.
#     Detection fails SAFE: if the diff base can't be determined, the build/test run anyway.
#   - Concurrency cancel-in-progress belongs in the CALLER workflow (it is the run that gets
#     cancelled), so it is intentionally not set here. See the caller template.
#   - Callers that want the `run-integration` label path must list the label events:
#     on.pull_request.types: [opened, synchronize, reopened, labeled, unlabeled].

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the backend solution root.
        type: string
        default: backend
      dotnet-version:
        description: .NET SDK version passed to actions/setup-dotnet.
        type: string
        default: '10.0.x'
      test-filter:
        description: >
          Optional global `dotnet test --filter` expression ANDed into both the unit and the
          integration tier (for example `Category!=RequiresStripe`). Empty applies no global filter.
        type: string
        default: ''
      unit-test-filter:
        description: >
          Filter selecting the fast unit tests; runs on every backend change and is the merge gate.
          Default excludes the integration namespace.
        type: string
        default: 'FullyQualifiedName!~.Integration.'
      integration-test-filter:
        description: >
          Filter selecting the heavy integration tests; runs only on main pushes, tags, or a PR
          labelled run-integration. Default selects the integration namespace.
        type: string
        default: 'FullyQualifiedName~.Integration.'
      backend-paths:
        description: >
          Space-separated git pathspecs whose changes should trigger the full backend build/test.
          Must include every file class that influences backend CI (the backend tree, CI workflows,
          and any shared root files like global.json or Directory.Build.props if the repo has them).
        type: string
        default: 'backend/ .github/workflows/'

jobs:
  backend:
    runs-on: ubuntu-latest
    name: "[BACKEND] Build and Test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            spec="$base...HEAD"
          else
            base="${{ github.event.before }}"
            spec="$base HEAD"
          fi
          # Fail safe: if the base is missing or unreachable, run the full build/test.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "Base commit unavailable; running backend build/test to be safe."
            echo "backend=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only $spec -- ${{ inputs.backend-paths }} | grep -q .; then
            echo "Backend-relevant changes detected."
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "No backend-relevant changes (${{ inputs.backend-paths }}); skipping build and test."
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        if: steps.changes.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        if: steps.changes.outputs.backend == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: dotnet restore

      - name: Build
        if: steps.changes.outputs.backend == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        # Fast tier: every backend change. This is the PR merge gate.
        if: steps.changes.outputs.backend == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: |
          FILTER="${{ inputs.unit-test-filter }}"
          if [ -n "${{ inputs.test-filter }}" ]; then FILTER="(${FILTER})&(${{ inputs.test-filter }})"; fi
          echo "Unit test filter: $FILTER"
          dotnet test --no-build --configuration Release --verbosity normal --filter "$FILTER"

      - name: Run integration tests
        # Heavy Testcontainers suite. Runs on main pushes (staging deploy), tags (prod), or a PR
        # explicitly labelled run-integration. Detection, not prevention, on main: a failed main run
        # does NOT auto-block (required checks gate PRs, not pushes) -- the red-main operating rule
        # applies. Restricted to main (not "any push") to prevent policy drift from future callers.
        if: >
          steps.changes.outputs.backend == 'true' && (
            startsWith(github.ref, 'refs/tags/') ||
            github.ref == 'refs/heads/main' ||
            contains(github.event.pull_request.labels.*.name, 'run-integration')
          )
        working-directory: ${{ inputs.working-directory }}
        run: |
          FILTER="${{ inputs.integration-test-filter }}"
          if [ -n "${{ inputs.test-filter }}" ]; then FILTER="(${FILTER})&(${{ inputs.test-filter }})"; fi
          echo "Integration test filter: $FILTER"
          dotnet test --no-build --configuration Release --verbosity normal --filter "$FILTER"
